<svg viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg" width="900" height="90">
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#ffffff" opacity="0.02"/>
    </pattern>
  </defs>
  <rect width="900" height="90" fill="#050810"/>
  <rect width="900" height="90" fill="url(#scanlines)"/>
  <!-- top hairline -->
  <rect width="900" height="0.5" fill="#1e3a5f" opacity="0.8"/>
  <!-- blue accent line -->
  <rect y="2" width="900" height="1.5" fill="#4fc3f7" opacity="0.25"/>
  <!-- small monolith left -->
  <rect x="30" y="25" width="14" height="42" rx="1" fill="#0a1628" stroke="#1e3a5f" stroke-width="0.6"/>
  <rect x="34" y="38" width="6" height="1.5" rx="0.5" fill="#4fc3f7" opacity="0.8"/>
  <!-- small monolith right -->
  <rect x="856" y="25" width="14" height="42" rx="1" fill="#0a1628" stroke="#1e3a5f" stroke-width="0.6"/>
  <rect x="860" y="38" width="6" height="1.5" rx="0.5" fill="#4fc3f7" opacity="0.8"/>
  <!-- quote -->
  <text x="450" y="42" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" letter-spacing="1" font-style="italic"
        fill="#4a6fa5">"Do not go gentle into that good night."</text>
  <!-- username -->
  <text x="450" y="64" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" letter-spacing="3"
        fill="#1e3a5f">sciencebanda09</text>
  <!-- star dots -->
  <circle cx="200" cy="52" r="0.7" fill="#ffffff" opacity="0.4"/>
  <circle cx="350" cy="30" r="0.6" fill="#ffffff" opacity="0.3"/>
  <circle cx="560" cy="70" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="720" cy="35" r="0.6" fill="#ffffff" opacity="0.3"/>
</svg>
